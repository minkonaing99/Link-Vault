<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LinksVault" />
    <title>Offline · LinksVault</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-page="offline">
    <div class="app-shell app-shell--narrow">
      <main class="page-stack page-stack--airy">
        <section class="surface surface--soft surface--group" style="text-align: center; padding: 48px 24px;">
          <h1 class="section-title" style="margin-bottom: 8px;">You're offline</h1>
          <p class="section-copy" style="margin-bottom: 24px;">Check your connection and try again.</p>
          <button type="button" onclick="window.location.reload()" class="button">Try again</button>
        </section>
      </main>
    </div>
  </body>
</html>
