<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f7" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LinksVault" />
    <title>Login · LinksVault</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-page="login" class="login-page">
    <main class="login-minimal">
      <section class="login-card surface">
        <div class="login-card__head">
          <div class="login-brand">
            <img class="brand-mark brand-mark--large" src="/img/logo-mark.png" alt="LinksVault logo" />
            <span class="page-kicker">LinksVault</span>
          </div>
          <h1 class="login-card__title">Welcome back</h1>
          <p class="login-card__subtitle">Sign in to continue.</p>
        </div>

        <form id="login-form" class="login-card__form">
          <label class="field-group">
            <span>Username</span>
            <input id="username" class="field login-field" type="text" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="Enter your username" required />
          </label>

          <label class="field-group">
            <span>Password</span>
            <input id="password" class="field login-field" type="password" autocomplete="current-password" placeholder="Enter your password" required />
          </label>

          <button type="submit" class="button login-submit">Sign in</button>
          <p id="login-message" class="form-message login-message"></p>
        </form>
      </section>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
